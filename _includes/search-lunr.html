<script src="{{ '/assets/js/lunr.min.js' | relative_url }}"></script>

<script>
  (function () {
    {% assign counter = 0 %}
    var documents = [
      {% comment %}
        Index regular pages
      {% endcomment %}
      {% for page in site.pages %}
        {% unless page.url == "/" or page.url contains ".xml" or page.url contains "assets" or page.search_exclude == true %}
      {
        "id": {{ counter }},
        "type": "page",
        "url": "{{ site.baseurl }}{{ page.url }}",
        "title": {{ page.title | default: page.url | jsonify }},
        "body": {{ page.content
          | markdownify
          | strip_html
          | strip_newlines
          | replace: "  ", " "
          | jsonify
        }}
      },
      {% assign counter = counter | plus: 1 %}
        {% endunless %}
      {% endfor %}

      {% comment %}
        Index resource groups and individual resources
      {% endcomment %}
      {% for resource in site.resources %}
        {% capture resource_text %}
{{ resource.summary }}
{% for item in resource.resources %}
{{ item.name }} {{ item.description }}
{% endfor %}
        {% endcapture %}
      {
        "id": {{ counter }},
        "type": "group",
        "url": "{{ resource.url | relative_url }}",
        "title": {{ resource.title | jsonify }},
        "body": {{ resource_text
          | strip_html
          | strip_newlines
          | replace: "  ", " "
          | jsonify
        }}
      },
      {% assign counter = counter | plus: 1 %}

      {% for item in resource.resources %}
        {% assign raw_view = item.view_url %}
        {% assign raw_download = item.download_url %}
        {% assign raw_preview = item.preview_image_url %}

        {% assign view_href = nil %}
        {% if raw_view %}
          {% if raw_view contains "://" %}
            {% assign view_href = raw_view %}
          {% else %}
            {% assign view_href = raw_view | relative_url %}
          {% endif %}
        {% endif %}

        {% assign download_href = nil %}
        {% if raw_download != "" %}
          {% if raw_download contains "://" %}
            {% assign download_href = raw_download %}
          {% else %}
            {% assign download_href = raw_download | relative_url %}
          {% endif %}
        {% endif %}

        {% assign preview_src = nil %}
        {% if raw_preview %}
          {% if raw_preview contains "://" %}
            {% assign preview_src = raw_preview %}
          {% else %}
            {% assign preview_src = raw_preview | relative_url %}
          {% endif %}
        {% endif %}

        {% assign download_suggested_name = nil %}
        {% if download_href %}
          {% assign card = item %}
          {% include download-suggested-filename.html %}
        {% endif %}

      {
        "id": {{ counter }},
        "type": "resource",
        "group_title": {{ resource.title | jsonify }},
        "group_url": "{{ resource.url | relative_url }}",
        "url": {{ view_href | default: download_href | default: resource.url | relative_url | jsonify }},
        "title": {{ item.name | jsonify }},
        "body": {{ item.description | jsonify }},
        "preview_image_url": {{ preview_src | jsonify }},
        "view_url": {{ view_href | jsonify }},
        "download_url": {{ download_href | jsonify }},
        "download_suggested_name": {% if download_suggested_name %}{{ download_suggested_name | jsonify }}{% else %}null{% endif %}
      },
      {% assign counter = counter | plus: 1 %}
      {% endfor %}
      {% endfor %}
    ];

    if (documents.length === 0 || typeof lunr === "undefined") {
      return;
    }

    var idx = lunr(function () {
      this.ref("id");
      this.field("title");
      this.field("body");

      documents.forEach(function (doc) {
        this.add(doc);
      }, this);
    });

    window.lunr_search = function (term) {
      var resultsContainer = document.getElementById("lunrsearchresults");
      if (!resultsContainer || !idx) return false;

      term = (term || "").trim();
      resultsContainer.innerHTML = "";

      if (!term) {
        return false;
      }

      var heading = document.createElement("p");
      heading.className = "text-xs md:text-sm text-slate-500 dark:text-slate-400 mb-3";
      heading.textContent = "Search results for '" + term + "'";
      resultsContainer.appendChild(heading);

      var list = document.createElement("ul");
      list.className = "space-y-3";
      resultsContainer.appendChild(list);

      var results = idx.search(term);

      if (!results.length) {
        var empty = document.createElement("li");
        empty.className = "text-sm text-slate-500 dark:text-slate-400";
        empty.textContent = "No results found...";
        list.appendChild(empty);
        return false;
      }

      results.forEach(function (result) {
        var doc = documents[result.ref];
        if (!doc) return;

        var li = document.createElement("li");
        var bodyPreview = (doc.body || "").substring(0, 140) + "...";

        if (doc.type === "resource") {
          var viewUrl = doc.view_url || doc.url;
          var downloadUrl = doc.download_url;
          var downloadAttr = "";
          if (downloadUrl && doc.download_suggested_name) {
            downloadAttr =
              ' download="' +
              String(doc.download_suggested_name).replace(/"/g, "") +
              '"';
          }

          li.innerHTML =
            '<div class="flex gap-4 p-4 rounded-2xl bg-white dark:bg-surface-dark border border-slate-100 dark:border-slate-700 shadow-soft hover:shadow-hover transition-shadow">' +
            (doc.preview_image_url
              ? '<div class="hidden sm:block w-20 h-20 rounded-xl overflow-hidden bg-slate-100 dark:bg-slate-800 flex-shrink-0">' +
                '<img src="' + doc.preview_image_url + '" alt="" class="w-full h-full object-cover" />' +
                "</div>"
              : "") +
            '<div class="flex-1 min-w-0">' +
            '<div class="text-xs uppercase tracking-wide text-primary mb-1">Resource</div>' +
            '<div class="text-sm font-semibold text-slate-900 dark:text-white truncate">' + doc.title + "</div>" +
            (doc.group_title
              ? '<div class="text-xs text-slate-500 dark:text-slate-400 mb-1">in ' +
                '<a href="' + (doc.group_url || "#") + '" class="underline-offset-2 hover:underline">' +
                doc.group_title +
                "</a></div>"
              : "") +
            '<div class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed mb-2 line-clamp-2">' +
            bodyPreview +
            "</div>" +
            '<div class="flex flex-wrap gap-2">' +
            (viewUrl
              ? '<a href="' + viewUrl + '" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-medium bg-primary text-white hover:bg-primary-dark transition-colors">' +
                '<span class="material-symbols-outlined text-sm mr-1">open_in_new</span>View' +
                "</a>"
              : "") +
            (downloadUrl
              ? '<a href="' +
                downloadUrl +
                '"' +
                downloadAttr +
                ' rel="noopener noreferrer" class="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-medium bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">' +
                '<span class="material-symbols-outlined text-sm mr-1">download</span>Download' +
                "</a>"
              : "") +
            "</div>" +
            "</div>" +
            "</div>";
        } else if (doc.type === "group") {
          li.innerHTML =
            '<a href="' + doc.url + '" class="block p-4 rounded-2xl bg-white dark:bg-surface-dark border border-slate-100 dark:border-slate-700 shadow-soft hover:shadow-hover transition-shadow">' +
            '<div class="flex items-center justify-between mb-1">' +
            '<div class="text-sm font-semibold text-slate-900 dark:text-white">' + doc.title + "</div>" +
            '<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-rose-100 text-rose-900 dark:bg-rose-950/50 dark:text-rose-100">' +
            '<span class="material-symbols-outlined text-xs mr-1">folder</span>Resource Group' +
            "</span>" +
            "</div>" +
            '<div class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">' +
            bodyPreview +
            "</div>" +
            "</a>";
        } else {
          li.innerHTML =
            '<a href="' + doc.url + '" class="block p-4 rounded-2xl bg-white dark:bg-surface-dark border border-slate-100 dark:border-slate-700 shadow-soft hover:shadow-hover transition-shadow">' +
            '<div class="text-sm font-semibold text-slate-900 dark:text-white mb-1">' + doc.title + "</div>" +
            '<div class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">' +
            bodyPreview +
            "</div>" +
            "</a>";
        }

        list.appendChild(li);
      });

      return false;
    };
  })();
</script>
