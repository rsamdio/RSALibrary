<section class="relative bg-gradient-to-b from-slate-50 to-white dark:from-background-dark dark:to-surface-dark pt-16 pb-12 px-4 sm:px-6 lg:px-8 overflow-hidden">
  <div class="absolute top-0 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
  <div class="max-w-4xl mx-auto text-center">
    <div class="flex flex-col items-center gap-4 mb-6">
      <img
        src="{{ '/images/rsamdio.webp' | relative_url }}"
        alt="Rotaract South Asia MDIO"
        class="max-h-20 w-auto object-contain drop-shadow-md"
      />
    </div>
    <div
      class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-semibold mb-6"
    >
      <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
      Project Leader Mode Active
    </div>
    <h1
      class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight text-slate-900 dark:text-white mb-6 leading-tight"
    >
      RSA
      <span
        class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-rose-400"
        >Library</span
      >
    </h1>
    <p
      class="text-lg md:text-xl text-slate-600 dark:text-slate-300 mb-10 max-w-2xl mx-auto leading-relaxed"
    >
      A curated library of templates, toolkits, and checklists to support
      Rotaractors in their impactful journeys.
    </p>
    <div class="relative max-w-2xl mx-auto group">
      <form
        class="w-full"
        onsubmit="return lunr_search(document.getElementById('lunrsearch').value);"
      >
        <label
          class="flex items-center w-full h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-black/20 overflow-hidden focus-within:ring-2 focus-within:ring-primary/50 transition-all"
        >
          <div class="pl-5 pr-3 text-primary">
            <span class="material-symbols-outlined text-2xl">search</span>
          </div>
          <input
            id="lunrsearch"
            name="q"
            class="w-full h-full bg-transparent border-none focus:ring-0 text-md text-slate-900 dark:text-white placeholder:text-slate-400 font-medium"
            placeholder="Search project themes or files..."
            type="text"
            autocomplete="off"
          />
        </label>
      </form>
      <div
        id="lunrsearchresults"
        class="mt-6 text-left"
      ></div>
    </div>
  </div>
</section>
