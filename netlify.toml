[build]
  command = "npm ci && bundle install && bundle exec jekyll build"
  publish = "_site"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/lunr.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/search-init.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/assets/js/resource-group-share.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/assets/js/search-index.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[redirects]]
  from = "https://rsalibrary.netlify.app/*"
  to = "https://library.rsamdio.org/:splat"
  status = 301
  force = true

[[redirects]]
  # Fallback 404 page for any unmatched route
  from = "/*"
  to = "/404.html"
  status = 404