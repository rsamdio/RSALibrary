backend:
  name: git-gateway
  branch: main

site_url: "https://library.rsamdio.org"
# Same asset as _includes/hero.html (Rotaract South Asia MDIO mark)
logo_url: /images/rsamdio.webp

media_folder: "resources"
public_folder: "/resources"

collections:
  - name: "resources"
    label: "Resource Groups"
    label_singular: "Resource Group"
    folder: "_resources"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: false
    # List view: show homepage sort weight next to title (same as Jekyll `nav_order`)
    summary: "{{nav_order}} · {{title}}"
    # Default list order matches homepage (`nav_order` in Jekyll / thematic-groups.html)
    sortable_fields:
      - field: nav_order
        default_sort: asc
      - title
      - commit_date
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Icon"
        name: "icon"
        widget: "materialIconSelect"
        options:
