<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Resource Center Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Material Symbols Outlined for icon preview in admin -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  </head>
  <body>
    <!-- Netlify Identity widget provides auth for Decap CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- Decap CMS (Netlify CMS successor) -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // Optional: redirect logged-in editors back to the site root
      if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            document.location.href = '/admin/';
          });
        }
      });
    }
    </script>

    <script>
      (function() {
        var CMS = window.CMS;
        if (!CMS) return;
        // Decap exposes createClass/h as globals; fall back to those to avoid
        // \"createClass is not a function\" errors in the CDN bundle.
        var createClass = window.createClass || (CMS && CMS.createClass);
        var h = window.h || (CMS && CMS.h) || (window.React && window.React.createElement);
        if (!createClass || !h) return;

        function optionsToArray(field) {
          var raw = field.get('options');
          if (!raw) return [];
          if (raw.toJS) return raw.toJS();
          return Array.isArray(raw) ? raw : [];
        }

        var MaterialIconSelectControl = createClass({
          getInitialState: function() {
            return { open: false, search: '' };
          },

          handleToggle: function() {
            this.setState({ open: !this.state.open, search: '' });
          },

          handleSelect: function(value) {
            this.props.onChange(value);
            this.setState({ open: false, search: '' });
          },

          handleSearchChange: function(e) {
            this.setState({ search: (e.target.value || '').trim().toLowerCase() });
          },

          handleClickOutside: function(e) {
            if (this._drop && this._drop.contains(e.target)) return;
            if (this._trigger && this._trigger.contains(e.target)) return;
            this.setState({ open: false });
          },

          componentDidMount: function() {
            document.addEventListener('click', this.handleClickOutside);
          },

          componentWillUnmount: function() {
            document.removeEventListener('click', this.handleClickOutside);
          },

          render: function() {
            var self = this;
            var value = this.props.value;
            var options = optionsToArray(this.props.field);
            var search = this.state.search;
            var filtered = options;
            if (search) {
              filtered = options.filter(function(o) {
                var l = (o.label || '').toLowerCase();
                var v = (o.value || '').toLowerCase();
                return l.indexOf(search) !== -1 || v.indexOf(search) !== -1;
              });
            }
            var current = options.find(function(o) { return o.value === value; }) || { label: value || 'Choose icon…', value: value };

            return h('div', { className: this.props.classNameWrapper, style: { position: 'relative' } },
              h('button', {
                type: 'button',
                ref: function(r) { self._trigger = r; },
                onClick: this.handleToggle,
                className: 'material-icon-select-trigger',
                style: {
                  display: 'flex', alignItems: 'center', gap: '8px', width: '100%',
                  padding: '8px 12px', textAlign: 'left', border: '1px solid #ccc',
                  borderRadius: '4px', background: '#fff', cursor: 'pointer', fontSize: '14px'
                }
              },
                value ? h('span', {
                  className: 'material-symbols-outlined',
                  style: { fontSize: '22px', color: '#333', flexShrink: 0 }
                }, value) : null,
                h('span', { style: { flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, current.label)
              ),
              this.state.open ? h('div', {
                ref: function(r) { self._drop = r; },
                className: 'material-icon-select-dropdown',
                style: {
                  position: 'absolute', left: 0, right: 0, top: '100%', marginTop: '4px', zIndex: 1000,
                  background: '#fff', border: '1px solid #ccc', borderRadius: '6px', boxShadow: '0 4px 12px rgba(0,0,0,0.15)',
                  maxHeight: '320px', display: 'flex', flexDirection: 'column', overflow: 'hidden'
                }
              },
                h('input', {
                  type: 'text',
                  placeholder: 'Search icons…',
                  value: this.state.search,
                  onChange: this.handleSearchChange,
                  onFocus: function(e) { e.stopPropagation(); },
                  onClick: function(e) { e.stopPropagation(); },
                  style: {
                    margin: '8px', padding: '8px 10px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '14px'
                  }
                }),
                h('div', {
                  style: { overflowY: 'auto', flex: 1, minHeight: '200px', padding: '4px' }
                }, [
                  search && filtered.length > 0 ? h('div', { key: 'hint', style: { padding: '4px 10px', fontSize: '12px', color: '#666' } }, filtered.length + ' match' + (filtered.length !== 1 ? 'es' : '')) : null,
                  !search && filtered.length > 200 ? h('div', { key: 'tip', style: { padding: '4px 10px', fontSize: '12px', color: '#666' } }, 'Type to search. Showing first 200.') : null
                ].concat(filtered.slice(0, search ? 300 : 200).map(function(opt) {
                  var isSelected = opt.value === value;
                  return h('button', {
                    key: opt.value,
                    type: 'button',
                    onClick: function() { self.handleSelect(opt.value); },
                    style: {
                      display: 'flex', alignItems: 'center', gap: '8px', width: '100%',
                      padding: '6px 10px', textAlign: 'left', border: 'none', borderRadius: '4px',
                      background: isSelected ? '#e0f2fe' : 'transparent', cursor: 'pointer', fontSize: '13px'
                    }
                  },
                    h('span', { className: 'material-symbols-outlined', style: { fontSize: '20px', color: '#333', flexShrink: 0 } }, opt.value),
                    h('span', { style: { overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, opt.label)
                  );
                })))
              ) : null
            );
          }
        });

        var MaterialIconSelectPreview = createClass({
          render: function() {
            var value = this.props.value;
            if (!value) return h('span', { style: { color: '#999' } }, 'No icon selected');
            return h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '6px' } },
              h('span', { className: 'material-symbols-outlined', style: { fontSize: '20px' } }, value),
              h('span', null, value)
            );
          }
        });

        CMS.registerWidget('materialIconSelect', MaterialIconSelectControl, MaterialIconSelectPreview);

        // Icon color select widget with visual swatches
        var colorSwatches = {
          blue: '#2563eb',
          sky: '#0ea5e9',
          cyan: '#06b6d4',
          teal: '#14b8a6',
          emerald: '#10b981',
          green: '#22c55e',
          lime: '#84cc16',
          amber: '#f59e0b',
          yellow: '#eab308',
          orange: '#f97316',
          rose: '#f43f5e',
          pink: '#ec4899',
          red: '#ef4444',
          fuchsia: '#d946ef',
          purple: '#a855f7',
          violet: '#8b5cf6',
          indigo: '#4f46e5',
          slate: '#64748b'
        };

        var IconColorSelectControl = createClass({
          getInitialState: function() {
            return { open: false };
          },

          handleToggle: function() {
            this.setState({ open: !this.state.open });
          },

          handleSelect: function(value) {
            this.props.onChange(value);
            this.setState({ open: false });
          },

          handleClickOutside: function(e) {
            if (this._drop && this._drop.contains(e.target)) return;
            if (this._trigger && this._trigger.contains(e.target)) return;
            this.setState({ open: false });
          },

          componentDidMount: function() {
            document.addEventListener('click', this.handleClickOutside);
          },

          componentWillUnmount: function() {
            document.removeEventListener('click', this.handleClickOutside);
          },

          render: function() {
            var self = this;
            var value = this.props.value || this.props.field.get('default');
            var options = optionsToArray(this.props.field);
            var current = options.find(function(o) { return o.value === value; }) || options[0] || { label: 'Choose color', value: null };
            var swatchColor = colorSwatches[current.value] || '#64748b';

            return h('div', { className: this.props.classNameWrapper, style: { position: 'relative' } },
              h('button', {
                type: 'button',
                ref: function(r) { self._trigger = r; },
                onClick: this.handleToggle,
                style: {
                  display: 'flex', alignItems: 'center', gap: '8px', width: '100%',
                  padding: '8px 12px', textAlign: 'left', border: '1px solid #ccc',
                  borderRadius: '4px', background: '#fff', cursor: 'pointer', fontSize: '14px'
                }
              },
                h('span', {
                  style: {
                    width: '18px', height: '18px', borderRadius: '999px',
                    backgroundColor: swatchColor, border: '1px solid rgba(15,23,42,0.15)',
                    boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.4)', flexShrink: 0
                  }
                }),
                h('span', { style: { flex: 1 } }, current.label)
              ),
              this.state.open ? h('div', {
                ref: function(r) { self._drop = r; },
                style: {
                  position: 'absolute', left: 0, right: 0, top: '100%', marginTop: '4px', zIndex: 1000,
                  background: '#fff', border: '1px solid #ccc', borderRadius: '6px',
                  boxShadow: '0 4px 12px rgba(0,0,0,0.15)', maxHeight: '260px', overflowY: 'auto'
                }
              },
                options.map(function(opt) {
                  var c = colorSwatches[opt.value] || '#64748b';
                  var isSelected = opt.value === value;
                  return h('button', {
                    key: opt.value,
                    type: 'button',
                    onClick: function() { self.handleSelect(opt.value); },
                    style: {
                      display: 'flex', alignItems: 'center', gap: '8px', width: '100%',
                      padding: '6px 10px', textAlign: 'left', border: 'none',
                      background: isSelected ? 'rgba(191, 219, 254, 0.7)' : 'transparent',
                      cursor: 'pointer', fontSize: '13px'
                    }
                  },
                    h('span', {
                      style: {
                        width: '16px', height: '16px', borderRadius: '999px',
                        backgroundColor: c, border: '1px solid rgba(15,23,42,0.15)',
                        boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.4)', flexShrink: 0
                      }
                    }),
                    h('span', null, opt.label)
                  );
                })
              ) : null
            );
          }
        });

        var IconColorSelectPreview = createClass({
          render: function() {
            var value = this.props.value;
            if (!value) return h('span', { style: { color: '#999' } }, 'No color selected');
            var label = value;
            var field = this.props.field;
            if (field) {
              var opts = optionsToArray(field);
              var found = opts.find(function(o) { return o.value === value; });
              if (found) label = found.label;
            }
            var c = colorSwatches[value] || '#64748b';
            return h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '6px' } },
              h('span', {
                style: {
                  width: '14px', height: '14px', borderRadius: '999px',
                  backgroundColor: c, border: '1px solid rgba(15,23,42,0.15)',
                  boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.4)'
                }
              }),
              h('span', null, label)
            );
          }
        });

        CMS.registerWidget('iconColorSelect', IconColorSelectControl, IconColorSelectPreview);

        // File type label widget: text input + common types dropdown
        var standardFileTypes = [
          'PDF',
          'PPTX',
          'DOCX',
          'XLSX',
          'CSV',
          'ZIP',
          'MP4',
          'MP3',
          'IMG',
          'Spreadsheet',
          'Slides',
          'Document',
          'List',
          'Form',
          'Link'
        ];

        var FileTypeComboControl = createClass({
          handleInputChange: function(e) {
            this.props.onChange(e.target.value);
          },

          handleSelectChange: function(e) {
            var v = e.target.value;
            if (!v) return;
            this.props.onChange(v);
          },

          render: function() {
            var value = this.props.value || '';
            var forID = this.props.forID;

            return h('div', { className: this.props.classNameWrapper },
              h('input', {
                id: forID,
                type: 'text',
                value: value,
                onChange: this.handleInputChange,
                placeholder: 'e.g. PPTX, PDF, MP4, ZIP',
                style: {
                  width: '100%',
                  padding: '8px 10px',
                  borderRadius: '4px',
                  border: '1px solid #ccc',
                  fontSize: '14px',
                  boxSizing: 'border-box',
                  marginBottom: '6px'
                }
              }),
              h('div', { style: { display: 'flex', alignItems: 'center', gap: '6px' } },
                h('label', {
                  htmlFor: forID + '-preset',
                  style: { fontSize: '12px', color: '#555', whiteSpace: 'nowrap' }
                }, 'Quick pick:'),
                h('select', {
                  id: forID + '-preset',
                  onChange: this.handleSelectChange,
                  value: '',
                  style: {
                    flex: 1,
                    padding: '6px 8px',
                    borderRadius: '4px',
                    border: '1px solid #ccc',
                    fontSize: '13px'
                  }
                },
                  [h('option', { key: '', value: '' }, '-- Choose common type --')]
                    .concat(standardFileTypes.map(function(t) {
                      return h('option', { key: t, value: t }, t);
                    }))
                )
              )
            );
          }
        });

        var FileTypeComboPreview = createClass({
          render: function() {
            var value = this.props.value;
            if (!value) return h('span', { style: { color: '#999' } }, 'No file type set');
            return h('span', null, value);
          }
        });

        CMS.registerWidget('fileTypeCombo', FileTypeComboControl, FileTypeComboPreview);
      })();
    </script>
  </body>
</html>
