---
layout: default
---

<section class="py-12 px-4 sm:px-6 md:px-8 lg:px-12 bg-background-light dark:bg-background-dark">
  <div class="max-w-3xl mx-auto">
    {% if page.title %}
    <h1 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-white mb-4">
      {{ page.title }}
    </h1>
    {% endif %}

    <div class="prose prose-slate dark:prose-invert max-w-none text-sm md:text-base">
      {{ content }}
    </div>
  </div>
</section>
